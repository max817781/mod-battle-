<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>半周年 MOD 爭權大賽｜Kahoot 回放</title>
    <style>
        :root {
            --purple: #4d3471;
            --purple-dark: #2d1c43;
            --cream: #fff8e7;
            --paper: #fffdf7;
            --yellow: #f5cf5f;
            --red: #e91e44;
            --blue: #1976d2;
            --gold: #d8a500;
            --green: #1d8f10;
            --ink: #332b3f;
            --muted: #7b7284;
            --shadow: 0 18px 45px rgba(32, 22, 52, .22);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
            color: var(--paper);
            background:
                radial-gradient(circle at 15% 18%, rgba(255,255,255,.18), transparent 26rem),
                radial-gradient(circle at 85% 8%, rgba(245,207,95,.18), transparent 24rem),
                linear-gradient(135deg, #392058, #5a3b7c 46%, #2d1c43);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
            background-size: 56px 56px;
            opacity: .18;
            pointer-events: none;
        }

        .page {
            position: relative;
            width: min(1180px, calc(100% - 28px));
            margin: 0 auto;
            padding: 34px 0 52px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 900;
            letter-spacing: .04em;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: rgba(255,255,255,.16);
            border: 1px solid rgba(255,255,255,.24);
            box-shadow: var(--shadow);
            font-size: 24px;
        }

        .home-link {
            color: var(--paper);
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.26);
            background: rgba(255,255,255,.08);
            font-weight: 800;
        }

        .card {
            border-radius: 28px;
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.22);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            overflow: hidden;
        }

        .start-screen,
        .result-screen {
            min-height: 620px;
            display: grid;
            place-items: center;
            padding: 36px;
            text-align: center;
        }

        .start-box,
        .result-box {
            max-width: 780px;
        }

        .eyebrow {
            color: var(--yellow);
            font-weight: 900;
            letter-spacing: .16em;
            font-size: 13px;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(40px, 7vw, 78px);
            line-height: 1.02;
            margin: 14px 0 18px;
            text-shadow: 0 8px 24px rgba(0,0,0,.22);
        }

        .lead {
            color: rgba(255,255,255,.82);
            font-size: 18px;
            line-height: 1.8;
            margin: 0 auto 28px;
            max-width: 720px;
        }

        button {
            font: inherit;
        }

        .primary-btn,
        .ghost-btn {
            border: 0;
            cursor: pointer;
            border-radius: 999px;
            padding: 14px 26px;
            font-weight: 900;
            font-size: 17px;
            transition: transform .2s ease, filter .2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .primary-btn {
            color: #2d1c43;
            background: var(--yellow);
            box-shadow: 0 12px 28px rgba(245, 207, 95, .28);
        }

        .ghost-btn {
            color: var(--paper);
            background: rgba(255,255,255,.13);
            border: 1px solid rgba(255,255,255,.25);
            text-decoration: none;
        }

        .primary-btn:hover,
        .ghost-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .hidden {
            display: none !important;
        }

        .quiz-layout {
            display: grid;
            grid-template-rows: auto 1fr auto auto;
            min-height: 760px;
        }

        .quiz-header {
            display: grid;
            grid-template-columns: 100px 1fr 100px;
            gap: 18px;
            align-items: center;
            padding: 22px;
        }

        .status-pill {
            display: grid;
            place-items: center;
            min-width: 82px;
            min-height: 82px;
            border-radius: 50%;
            justify-self: center;
            background: #5621a8;
            color: #fff;
            font-weight: 900;
            font-size: 32px;
            border: 7px solid rgba(255,255,255,.15);
            box-shadow: var(--shadow);
            text-align: center;
            padding: 8px;
        }

        .status-pill small {
            display: block;
            font-size: 12px;
            margin-top: -2px;
            opacity: .86;
            letter-spacing: .05em;
        }

        .question-box {
            background: #fff;
            color: #2e2934;
            border-radius: 8px;
            padding: 18px 24px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .question-box .question-count {
            color: #6b5c79;
            font-weight: 900;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .question-box h2 {
            margin: 0;
            font-size: clamp(24px, 3.6vw, 40px);
            line-height: 1.25;
        }

        .quiz-main {
            padding: 0 24px 24px;
            display: grid;
            gap: 20px;
            align-content: center;
        }

        .image-panel {
            margin: 0 auto;
            width: min(620px, 100%);
            min-height: 330px;
            border-radius: 22px;
            background:
                radial-gradient(circle at 30% 25%, rgba(255,255,255,.8), transparent 7rem),
                linear-gradient(135deg, #f7efda, #dfeeb4);
            border: 14px solid #fff;
            color: #3a2b55;
            display: grid;
            place-items: center;
            text-align: center;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .image-panel img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #fff;
        }

        .image-placeholder {
            font-size: 82px;
            line-height: 1.1;
            padding: 22px;
        }

        .image-placeholder span {
            display: block;
            font-size: 18px;
            margin-top: 14px;
            font-weight: 900;
            color: #5b4770;
        }

        .answers {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            padding: 0 34px 16px;
        }

        .answers.count-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .answers.count-3 .answer-btn:last-child {
            grid-column: 1 / -1;
        }

        .answer-btn {
            min-height: 98px;
            color: #fff;
            border: 0;
            cursor: pointer;
            border-radius: 8px;
            padding: 18px 20px;
            font-size: clamp(20px, 2.4vw, 30px);
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 16px;
            text-align: left;
            box-shadow: 0 8px 0 rgba(0,0,0,.18);
            position: relative;
            overflow: hidden;
            transition: transform .16s ease, filter .16s ease, opacity .16s ease;
        }

        .answer-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.06);
        }

        .answer-btn:disabled {
            cursor: default;
        }

        .answer-btn .symbol {
            font-size: 34px;
            width: 38px;
            text-align: center;
            flex: 0 0 auto;
        }

        .answer-btn .label {
            position: relative;
            z-index: 2;
            padding-bottom: 22px;
        }

        .answer-btn.red { background: var(--red); }
        .answer-btn.blue { background: var(--blue); }
        .answer-btn.gold { background: var(--gold); color: #fff; }
        .answer-btn.green { background: var(--green); }

        .answer-btn.dimmed {
            opacity: .55;
        }

        .answer-btn.correct {
            outline: 5px solid rgba(255,255,255,.92);
            filter: brightness(1.08);
        }

        .answer-btn.wrong {
            outline: 5px solid rgba(255,255,255,.72);
            filter: saturate(.78);
        }

        .reaction-chip {
            position: absolute;
            left: 16px;
            right: 16px;
            bottom: 10px;
            z-index: 3;
            background: rgba(255,255,255,.95);
            color: #2e2934;
            border-radius: 12px;
            padding: 8px 10px;
            font-size: 14px;
            line-height: 1.35;
            box-shadow: 0 8px 18px rgba(0,0,0,.18);
        }

        .feedback {
            margin: 0 24px 24px;
            padding: 18px 22px;
            border-radius: 20px;
            background: rgba(255,255,255,.14);
            border: 1px solid rgba(255,255,255,.22);
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .feedback.show {
            display: flex;
        }

        .feedback-text {
            line-height: 1.7;
        }

        .feedback-text strong {
            color: var(--yellow);
            display: block;
            font-size: 18px;
        }

        .feedback-actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .result-box h2 {
            font-size: clamp(34px, 6vw, 64px);
            margin: 12px 0;
        }

        .score-big {
            display: inline-grid;
            place-items: center;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            background: var(--yellow);
            color: var(--purple-dark);
            font-weight: 1000;
            font-size: 40px;
            margin: 18px 0;
            box-shadow: var(--shadow);
        }

        .title-card {
            background: rgba(255,255,255,.14);
            border: 1px solid rgba(255,255,255,.24);
            border-radius: 22px;
            padding: 22px;
            margin: 18px auto 26px;
            max-width: 640px;
        }

        .title-card h3 {
            font-size: 28px;
            margin: 0 0 8px;
            color: var(--yellow);
        }

        .title-card p {
            margin: 0;
            color: rgba(255,255,255,.84);
            line-height: 1.7;
        }

        .result-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .dev-note {
            margin-top: 18px;
            color: rgba(255,255,255,.62);
            font-size: 13px;
            line-height: 1.6;
        }

        @media (max-width: 760px) {
            .page {
                width: min(100% - 18px, 1180px);
                padding-top: 16px;
            }

            .topbar {
                align-items: flex-start;
            }

            .brand span {
                display: none;
            }

            .quiz-layout {
                min-height: auto;
            }

            .quiz-header {
                grid-template-columns: 68px 1fr 68px;
                padding: 12px;
                gap: 8px;
            }

            .status-pill {
                min-width: 58px;
                min-height: 58px;
                font-size: 22px;
                border-width: 5px;
            }

            .status-pill small {
                font-size: 10px;
            }

            .question-box {
                padding: 14px 12px;
            }

            .quiz-main {
                padding: 0 12px 12px;
            }

            .image-panel {
                min-height: 230px;
                border-width: 8px;
            }

            .image-placeholder {
                font-size: 58px;
            }

            .answers,
            .answers.count-2,
            .answers.count-3 {
                grid-template-columns: 1fr;
                padding: 0 12px 12px;
            }

            .answers.count-3 .answer-btn:last-child {
                grid-column: auto;
            }

            .answer-btn {
                min-height: 84px;
                font-size: 20px;
                padding: 14px 16px;
            }

            .answer-btn .symbol {
                font-size: 26px;
                width: 30px;
            }

            .feedback {
                margin: 0 12px 12px;
                flex-direction: column;
                align-items: flex-start;
            }

            .feedback-actions {
                width: 100%;
                justify-content: stretch;
            }

            .feedback-actions button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div class="brand">
                <div class="brand-mark">🦖</div>
                <span>DINOSAUR YANYAN EVENT ROOM</span>
            </div>
            <a class="home-link" id="homeTopLink" href="../../index.html">回到博物館首頁</a>
        </div>

        <section class="card start-screen" id="startScreen">
            <div class="start-box">
                <div class="eyebrow">HALF ANNIVERSARY REPLAY</div>
                <h1 id="gameTitle">半周年 MOD 爭權大賽</h1>
                <p class="lead" id="gameSubtitle">重溫那場小龍包們的答題修羅場。</p>
                <button class="primary-btn" id="startBtn" type="button">開始挑戰 ▶</button>
            </div>
        </section>

        <section class="card quiz-screen hidden" id="quizScreen">
            <div class="quiz-layout">
                <div class="quiz-header">
                    <div class="status-pill" id="timerPill">20</div>
                    <div class="question-box">
                        <div class="question-count" id="questionCount">第 1 / 20 題</div>
                        <h2 id="questionText">Question</h2>
                    </div>
                    <div class="status-pill">
                        <div>
                            <span id="scoreText">0</span>
                            <small>分數</small>
                        </div>
                    </div>
                </div>

                <main class="quiz-main">
                    <div class="image-panel" id="imagePanel"></div>
                </main>

                <div class="answers" id="answersContainer"></div>

                <div class="feedback" id="feedbackBox">
                    <div class="feedback-text" id="feedbackText"></div>
                    <div class="feedback-actions">
                        <button class="primary-btn" id="nextBtn" type="button">下一題 ▶</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="card result-screen hidden" id="resultScreen">
            <div class="result-box">
                <div class="eyebrow">RESULT</div>
                <h2>挑戰完成！</h2>
                <div class="score-big"><span id="finalScore">0 / 20</span></div>
                <div class="title-card">
                    <h3 id="resultTitle">稱號</h3>
                    <p id="resultDesc">稱號描述</p>
                </div>
                <div class="result-actions">
                    <button class="primary-btn" id="restartBtn" type="button">再玩一次</button>
                    <a class="ghost-btn" id="homeResultLink" href="../../index.html">回到博物館首頁</a>
                </div>
            </div>
        </section>
    </div>

    <script src="./mod-quiz-data.js"></script>
    <script>
        const data = window.modQuizData || {};
        const symbols = ["▲", "◆", "●", "■"];
        const colors = ["red", "blue", "gold", "green"];

        let currentIndex = 0;
        let score = 0;
        let playQuestions = [];
        let timer = null;
        let remaining = 0;
        let answered = false;
        let audioCache = new Map();

        const startScreen = document.getElementById("startScreen");
        const quizScreen = document.getElementById("quizScreen");
        const resultScreen = document.getElementById("resultScreen");
        const startBtn = document.getElementById("startBtn");
        const restartBtn = document.getElementById("restartBtn");
        const nextBtn = document.getElementById("nextBtn");
        const timerPill = document.getElementById("timerPill");
        const scoreText = document.getElementById("scoreText");
        const questionCount = document.getElementById("questionCount");
        const questionText = document.getElementById("questionText");
        const imagePanel = document.getElementById("imagePanel");
        const quizMain = document.querySelector(".quiz-main");
        const answersContainer = document.getElementById("answersContainer");
        const feedbackBox = document.getElementById("feedbackBox");
        const feedbackText = document.getElementById("feedbackText");
        const finalScore = document.getElementById("finalScore");
        const resultTitle = document.getElementById("resultTitle");
        const resultDesc = document.getElementById("resultDesc");
        const gameTitle = document.getElementById("gameTitle");
        const gameSubtitle = document.getElementById("gameSubtitle");
        const homeTopLink = document.getElementById("homeTopLink");
        const homeResultLink = document.getElementById("homeResultLink");

        function init() {
            gameTitle.textContent = data.title || "半周年 MOD 爭權大賽";
            gameSubtitle.textContent = data.subtitle || "重溫那場小龍包們的答題修羅場。";

            if (data.homeLink) {
                homeTopLink.href = data.homeLink;
                homeResultLink.href = data.homeLink;
            }

            if (!Array.isArray(data.questions) || data.questions.length === 0) {
                gameSubtitle.textContent = "目前沒有題目，請先到 mod-quiz-data.js 新增 questions。";
                startBtn.disabled = true;
                startBtn.textContent = "題庫尚未建立";
            }

            preloadQuizAudio();
        }


        function shuffleQuestions(questions) {
            const shuffled = [...questions];

            for (let i = shuffled.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            return shuffled;
        }

        function showScreen(screen) {
            [startScreen, quizScreen, resultScreen].forEach(item => item.classList.add("hidden"));
            screen.classList.remove("hidden");
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function startGame() {
            currentIndex = 0;
            score = 0;
            playQuestions = shuffleQuestions(data.questions || []);
            preloadQuizAudio();
            showScreen(quizScreen);
            renderQuestion();
        }

        function renderQuestion() {
            clearInterval(timer);
            answered = false;

            const q = playQuestions[currentIndex];

            scoreText.textContent = score;
            questionCount.textContent = `第 ${currentIndex + 1} / ${playQuestions.length} 題`;
            questionText.textContent = q.question || "題目尚未設定";
            feedbackBox.classList.remove("show");
            feedbackText.innerHTML = "";

            renderImage(q);
            renderAnswers(q);
            startTimer(q.timeLimit || data.defaultTimeLimit || 20);
        }

        function resolveImagePath(path) {
            if (!path) return "";
            if (/^(https?:|data:|\/|\.\.?\/)/.test(path)) return path;
            return "../../" + path;
        }

        function renderImage(q) {
            imagePanel.innerHTML = "";

            if (!q.image) {
                quizMain.classList.add("hidden");
                return;
            }

            quizMain.classList.remove("hidden");

            const img = document.createElement("img");
            img.alt = q.question || "Kahoot 題目截圖";
            img.src = resolveImagePath(q.image);
            img.dataset.fallback = q.image;
            img.onerror = function () {
                if (!this.dataset.triedFallback) {
                    this.dataset.triedFallback = "1";
                    this.src = this.dataset.fallback;
                    return;
                }

                imagePanel.innerHTML = "";
                quizMain.classList.add("hidden");
            };
            imagePanel.appendChild(img);
        }

        function renderPlaceholder(q, note) {
            imagePanel.innerHTML = `
                <div class="image-placeholder">
                    ${escapeHtml(q.imageEmoji || "🦖")}
                    <span>${escapeHtml(note)}</span>
                </div>
            `;
        }

        function renderAnswers(q) {
            const choices = Array.isArray(q.choices) ? q.choices : [];
            answersContainer.className = `answers count-${choices.length}`;

            answersContainer.innerHTML = choices.map((choice, index) => `
                <button class="answer-btn ${colors[index % colors.length]}" type="button" data-index="${index}">
                    <span class="symbol">${symbols[index % symbols.length]}</span>
                    <span class="label">${escapeHtml(choice)}</span>
                </button>
            `).join("");

            answersContainer.querySelectorAll(".answer-btn").forEach(button => {
                button.addEventListener("click", () => handleAnswer(Number(button.dataset.index)));
            });
        }

        function startTimer(seconds) {
            remaining = Number(seconds) || 20;
            timerPill.textContent = remaining;
            timer = setInterval(() => {
                remaining -= 1;
                timerPill.textContent = remaining;
                if (remaining <= 0) {
                    clearInterval(timer);
                    handleAnswer(null);
                }
            }, 1000);
        }

        function isAnswerConfigured(q) {
            return Number.isInteger(q.answerIndex) && q.answerIndex >= 0 && q.answerIndex < (q.choices || []).length;
        }

        function handleAnswer(index) {
            if (answered) return;
            answered = true;
            clearInterval(timer);

            const q = playQuestions[currentIndex];
            const hasAnswer = isAnswerConfigured(q);
            const isTimeout = index === null;
            const isCorrect = hasAnswer && index === q.answerIndex;

            if (isCorrect) score += 1;
            scoreText.textContent = score;

            const buttons = [...answersContainer.querySelectorAll(".answer-btn")];

            buttons.forEach((button, buttonIndex) => {
                button.disabled = true;

                const isCorrectButton = hasAnswer && buttonIndex === q.answerIndex;
                const isSelectedButton = buttonIndex === index;

                if (isCorrectButton) button.classList.add("correct");
                if (isSelectedButton && !isCorrect) button.classList.add("wrong");
                if (!isCorrectButton && !isSelectedButton) button.classList.add("dimmed");

                if (isSelectedButton || (isTimeout && isCorrectButton)) {
                    const reactionIndex = isTimeout && hasAnswer ? q.answerIndex : buttonIndex;
                    const reaction = getReaction(q, reactionIndex, isTimeout);
                    if (reaction && reaction.trim()) {
                        button.insertAdjacentHTML("beforeend", `<span class="reaction-chip">${escapeHtml(reaction)}</span>`);
                    }
                }
            });

            renderFeedback(q, index, isCorrect, isTimeout, hasAnswer);
        }

        function getReaction(q, index, isTimeout = false) {
            if (isTimeout) return "諾諾：時間到了！這題不能逃避！";
            return q.reactions?.[index] || "";
        }

        function getAudioPath(q, index, isCorrect) {
            if (isCorrect) {
                return q.correctAudio || data.correctAudio || "";
            }

            return q.reactionAudio?.[index] || "";
        }

        function resolveAudioPath(path) {
            if (!path) return "";
            if (/^(https?:|data:|\/|\.\.?\/)/.test(path)) return path;
            return path;
        }

        function preloadAudio(path) {
            const resolvedPath = resolveAudioPath(path);
            if (!resolvedPath || audioCache.has(resolvedPath)) return audioCache.get(resolvedPath) || null;

            const audio = new Audio(resolvedPath);
            audio.preload = "auto";
            audio.load();
            audioCache.set(resolvedPath, audio);
            return audio;
        }

        function preloadQuizAudio() {
            preloadAudio(data.correctAudio || "");

            (data.questions || []).forEach(question => {
                preloadAudio(question.correctAudio || "");
                (question.reactionAudio || []).forEach(path => preloadAudio(path));
            });
        }

        function playAudio(path) {
            const resolvedPath = resolveAudioPath(path);
            if (!resolvedPath) return;

            const cachedAudio = preloadAudio(resolvedPath);
            if (!cachedAudio) return;

            try {
                cachedAudio.pause();
                cachedAudio.currentTime = 0;
                cachedAudio.play().catch(() => {
                    // 瀏覽器若阻擋自動播放，玩家仍可用「播放稱讚」按鈕手動播放。
                });
            } catch (error) {
                const fallbackAudio = new Audio(resolvedPath);
                fallbackAudio.play().catch(() => {});
            }
        }

        function renderFeedback(q, index, isCorrect, isTimeout, hasAnswer) {
            const selectedChoice = isTimeout ? "時間到，沒有作答" : (q.choices?.[index] || "未設定");
            const correctChoice = hasAnswer ? q.choices[q.answerIndex] : "正確答案尚未設定";
            const reaction = isTimeout ? getReaction(q, index, true) : getReaction(q, index);
            const reactionLine = reaction && reaction.trim() ? `${escapeHtml(reaction)}<br>` : "";
            const explanationLine = q.explanation && q.explanation.trim()
                ? `<span style="opacity:.8">${escapeHtml(q.explanation)}</span>`
                : "";
            const status = hasAnswer
                ? (isCorrect ? "答對了！" : "答錯了！")
                : "此題尚未設定正確答案";

            const scoringNote = hasAnswer
                ? ""
                : "<br><span style=\"opacity:.85\">這題目前不計分，請之後到 mod-quiz-data.js 補 answerIndex。</span>";

            feedbackText.innerHTML = `
                <strong>${escapeHtml(status)}</strong>
                你的選擇：${escapeHtml(selectedChoice)}<br>
                正確答案：${escapeHtml(correctChoice)}<br>
                ${reactionLine}
                ${explanationLine}
                ${scoringNote}
            `;

            const audioPath = !isTimeout ? getAudioPath(q, index, isCorrect) : "";
            if (audioPath) {


                playAudio(audioPath);
            } else {
                }

            nextBtn.textContent = currentIndex === playQuestions.length - 1 ? "查看結果 ▶" : "下一題 ▶";
            feedbackBox.classList.add("show");
        }

        function nextQuestion() {
            if (currentIndex >= playQuestions.length - 1) {
                showResult();
                return;
            }

            currentIndex += 1;
            renderQuestion();
        }

        function showResult() {
            clearInterval(timer);
            showScreen(resultScreen);

            const total = playQuestions.length;
            const title = (data.scoreTitles || []).find(item => score >= item.min && score <= item.max)
                || (data.scoreTitles || [])[0]
                || { title: "完成挑戰", desc: "你完成了這場半周年答題回放。" };

            finalScore.textContent = `${score} / ${total}`;
            resultTitle.textContent = title.title;
            resultDesc.textContent = title.desc;
        }

        startBtn.addEventListener("click", startGame);
        restartBtn.addEventListener("click", startGame);
        nextBtn.addEventListener("click", nextQuestion);

        init();
    </script>
</body>
</html>
